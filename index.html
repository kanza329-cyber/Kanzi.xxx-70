<!DOCTYPE html>
<html>
<head>
<title>Meme Sosial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    width:100%;
    background:#000;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:10;
}

/* BUTTON */
.btn{
    background:green;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    color:white;
    font-size:12px;
    cursor:pointer;
}

#file{ display:none; }

/* FEED */
.feed{
    margin-top:60px;
    padding:10px;
}

/* POST */
.post{
    background:#222;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
}

.post img{ width:100%; }

/* USER */
.user{
    display:flex;
    align-items:center;
    padding:8px;
}

.user img{
    width:30px;
    height:30px;
    border-radius:50%;
    margin-right:8px;
}

/* CAPTION */
.caption{
    padding:10px;
}

/* INPUT AREA */
.input-box{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;
}

/* PREVIEW */
.preview-box{
    position:absolute;
    bottom:55px;
    left:0;
    background:#222;
    padding:5px;
    border-radius:10px;
    display:flex;
    align-items:center;
}

.preview-box img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

.preview-box span{
    margin-left:5px;
    cursor:pointer;
}

/* INPUT */
#caption{
    width:70%;
    padding:10px;
    border-radius:10px;
    border:none;
}

/* BUTTON KIRIM */
.kirim{
    background:green;
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <div>🔥 Gambar Anime & Meme</div>

    <div>
        <button id="loginBtn" class="btn" onclick="login()">Login</button>

        <label class="btn">
            Upload
            <input type="file" id="file">
        </label>
    </div>
</div>

<div class="feed" id="feed"></div>

<!-- INPUT BOX -->
<div class="input-box">

    <div id="previewBox" class="preview-box" style="display:none;">
        <img id="previewImg">
        <span onclick="hapusPreview()">❌</span>
    </div>

    <input type="text" id="caption" placeholder="Caption...">
    <button class="kirim" onclick="upload()">Kirim</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDtFscaogQXfjb4qO2iovus99i4Zqsl_4",
  authDomain: "kanza-702f2.firebaseapp.com",
  projectId: "kanza-702f2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

// LOGIN
window.login = async function(){
    await signInWithPopup(auth, provider);
}

// UBAH TOMBOL LOGIN
onAuthStateChanged(auth, (user) => {
    let btn = document.getElementById("loginBtn");

    if(user){
        btn.innerText = user.displayName;
        btn.disabled = true;
    } else {
        btn.innerText = "Login";
        btn.disabled = false;
    }
});

// PREVIEW GAMBAR
document.getElementById("file").onchange = function(e){
    let file = e.target.files[0];

    if(file){
        document.getElementById("previewImg").src = URL.createObjectURL(file);
        document.getElementById("previewBox").style.display = "flex";
    }
}

// HAPUS PREVIEW
window.hapusPreview = function(){
    document.getElementById("file").value = "";
    document.getElementById("previewBox").style.display = "none";
}

// UPLOAD
window.upload = function(){

    let user = auth.currentUser;

    if(!user){
        alert("Login dulu 😅");
        return;
    }

    let fileInput = document.getElementById("file");
    let file = fileInput.files[0];
    let caption = document.getElementById("caption").value;

    if(!file){
        alert("Pilih gambar dulu 🗿");
        return;
    }

    let reader = new FileReader();

    reader.onload = async function(e){
        let img = e.target.result;

        await addDoc(collection(db, "posts"), {
            img: img,
            caption: caption,
            nama: user.displayName,
            foto: user.photoURL,
            waktu: new Date()
        });

        fileInput.value = "";
        document.getElementById("caption").value = "";
        document.getElementById("previewBox").style.display = "none";

        tampilkan();
    };

    reader.readAsDataURL(file);
}

// TAMPILKAN
async function tampilkan(){
    let data = await getDocs(collection(db, "posts"));

    let html = "";

    data.forEach(doc=>{
        let p = doc.data();

        html += `
        <div class="post">
            <div class="user">
                <img src="${p.foto}">
                <b>${p.nama}</b>
            </div>

            <img src="${p.img}">
            <div class="caption">${p.caption}</div>
        </div>
        `;
    });

    document.getElementById("feed").innerHTML = html;
}

tampilkan();

</script>

</body>
</html>
