<!DOCTYPE html>
<html>
<head>
<title>Meme Firebase</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    width:100%;
    background:#000;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:10;
}

/* BUTTON UPLOAD */
.upload-btn{
    background:green;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    color:white;
    font-size:12px;
    cursor:pointer;
}

/* HIDDEN INPUT */
#file{
    display:none;
}

/* FEED */
.feed{
    margin-top:60px;
    padding:10px;
}

/* POST */
.post{
    background:#222;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
}

.post img{
    width:100%;
}

.caption{
    padding:10px;
    font-size:14px;
}

/* INPUT CAPTION */
#caption{
    position:fixed;
    bottom:10px;
    left:10px;
    width:70%;
    padding:10px;
    border-radius:10px;
    border:none;
}

/* BUTTON KIRIM */
.kirim{
    position:fixed;
    bottom:10px;
    right:10px;
    background:green;
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>🔥 Meme Feed</div>
    <label class="upload-btn">
        Upload
        <input type="file" id="file">
    </label>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

<!-- INPUT -->
<input type="text" id="caption" placeholder="Tulis caption...">
<button class="kirim" onclick="upload()">Kirim</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 GANTI CONFIG KAMU
const firebaseConfig = {
  apiKey: "AIzaSyDDtFscaogQXfjb4qO2iovus99i4Zqsl_4",
  authDomain: "kanza-702f2.firebaseapp.com",
  projectId: "kanza-702f2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// UPLOAD
window.upload = function(){
    let file = document.getElementById("file").files[0];
    let caption = document.getElementById("caption").value;

    if(!file){
        alert("Pilih gambar dulu 🗿");
        return;
    }

    let reader = new FileReader();

    reader.onload = async function(e){
        let img = e.target.result;

        await addDoc(collection(db, "posts"), {
            img: img,
            caption: caption
        });

        document.getElementById("caption").value = "";
        tampilkan();
    };

    reader.readAsDataURL(file);
}

// TAMPILKAN
async function tampilkan(){
    let data = await getDocs(collection(db, "posts"));

    let html = "";

    data.forEach(doc=>{
        let p = doc.data();

        html += `
        <div class="post">
            <img src="${p.img}">
            <div class="caption">${p.caption}</div>
        </div>
        `;
    });

    document.getElementById("feed").innerHTML = html;
}

tampilkan();

</script>

</body>
</html>
