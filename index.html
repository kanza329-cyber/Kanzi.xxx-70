<!DOCTYPE html>
<html>
<head>
  <title>Pixel Battle Upgrade ⚔️</title>
  <style>
    body {
      background:#1b1b1b;
      color:white;
      text-align:center;
      font-family:Arial;
    }
    canvas {
      background:#2d2d2d;
      border:3px solid white;
      margin-top:10px;
    }
  </style>
</head>
<body>

<h2>⚔️ Pixel Battle (Move + Attack)</h2>
<p>Gerak: WASD / Panah | Serang: Spasi</p>
<p id="status"></p>

<canvas id="game" width="400" height="250"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

// PLAYER
let player = {
  x:50, y:100, size:20, hp:100, speed:3
};

// MONSTER
let monster = {
  x:300, y:100, size:20, hp:100, speed:1.2
};

// INPUT
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// LOOP
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// UPDATE
function update() {

  // GERAK PLAYER
  if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
  if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
  if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

  // BATAS MAP
  player.x = Math.max(0, Math.min(c.width - player.size, player.x));
  player.y = Math.max(0, Math.min(c.height - player.size, player.y));

  // MONSTER NGEPJAR
  if (monster.x > player.x) monster.x -= monster.speed;
  if (monster.x < player.x) monster.x += monster.speed;
  if (monster.y > player.y) monster.y -= monster.speed;
  if (monster.y < player.y) monster.y += monster.speed;

  // TABRAKAN (monster nyerang)
  if (collision(player, monster)) {
    player.hp -= 0.2;
  }

  // STATUS
  if (player.hp <= 0) {
    document.getElementById("status").innerText = "💀 Kamu kalah!";
  }
  if (monster.hp <= 0) {
    document.getElementById("status").innerText = "🎉 Kamu menang!";
  }
}

// DRAW
function draw() {
  ctx.clearRect(0,0,c.width,c.height);

  // PLAYER
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // MONSTER
  ctx.fillStyle="red";
  ctx.fillRect(monster.x, monster.y, monster.size, monster.size);

  // HP BAR
  ctx.fillStyle="white";
  ctx.fillText("HP: " + Math.floor(player.hp), 10, 15);
  ctx.fillText("Monster: " + Math.floor(monster.hp), 260, 15);
}

// SERANG
document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    attack();
  }
});

function attack() {
  // jarak serang
  let dist = Math.hypot(player.x - monster.x, player.y - monster.y);

  if (dist < 40) {
    monster.hp -= 10;
  }
}

// COLLISION
function collision(a, b) {
  return a.x < b.x + b.size &&
         a.x + a.size > b.x &&
         a.y < b.y + b.size &&
         a.y + a.size > b.y;
}

// START
gameLoop();
</script>

</body>
</html>
