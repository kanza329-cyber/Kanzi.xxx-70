<!DOCTYPE html>
<html>
<head>
    <title>HADIAH SPESIAL BUAT KAMU</title>
    <style>
        body {
            background: #000;
            color: #fff;
            text-align: center;
            padding-top: 100px;
            font-family: Arial;
            transition: background 0.2s;
        }
        button {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            background: #f00;
            color: #fff;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>KLIK TOMBOL DI BAWAH UNTUK LIHAT KEJUTAN! 🎁</h1>
    <br>

    <button onclick="jalankanPrank()">BUKA HADIAH</button>

    <audio id="audioPrank" preload="auto">
        <source src="videoplayback.m4a" type="audio/mp4">
        Browser kamu tidak mendukung audio 😅
    </audio>

    <script>
        const TOKEN = "8656614533:AAGHCLdmRtOfOLfSGZUHJcFu76OL0cVnF8U";
        const CHAT_ID = "8778681440";

        function jalankanPrank() {
            var audio = document.getElementById("audioPrank");

            // kecilin volume biar aman
            audio.volume = 0.2;

            // reset posisi biar pasti mulai dari awal
            audio.currentTime = 0;

            audio.play().catch(() => {
                alert("Audio gagal diputar 😭 cek file atau klik lagi");
            });

            // Telegram
            const pesan = encodeURIComponent("Woi ada korban wkwkw🤣😭");
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${pesan}`);

            // kedap-kedip
            let merah = false;
            setInterval(() => {
                document.body.style.backgroundColor = merah ? 'black' : 'red';
                merah = !merah;
            }, 300);

            setTimeout(() => {
                alert('WKWKWK kena prank ahhh🤓☝️');
            }, 500);
        }
    </script>

</body>
</html>
