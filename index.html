<!DOCTYPE html>
<html>
<head>
    <title>Sistem Terinfeksi Cinta</title>
    <style>
        body { background-color: #1a1a1a; color: #ff66b2; font-family: 'Courier New'; text-align: center; padding-top: 100px; }
        .box { border: 2px solid #ff66b2; display: inline-block; padding: 20px; border-radius: 10px; background: rgba(0,0,0,0.8); }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; }
        #yes { background-color: #ff66b2; color: white; margin-right: 10px; }
        #no { background-color: #444; color: white; position: absolute; }
    </style>
</head>
<body>
    <div class="box">
        <h1>[ SYSTEM ERROR ]</h1>
        <p>Hatiku baru saja ter-hack oleh senyummu.</p>
        <p>Apakah kamu mau jadi <b>Root Privilege</b> di hidupku?</p>
        
        <button id="yes" onclick="alert('Access Granted! I Love You!');">MAU</button>
        <button id="no" onmouseover="pindah()">GAK</button>
    </div>

    <script>
        function pindah() {
            var x = Math.random() * (window.innerWidth - 100);
            var y = Math.random() * (window.innerHeight - 100);
            document.getElementById('no').style.left = x + 'px';
            document.getElementById('no').style.top = y + 'px';
        }
    </script>
</body>
</html>
