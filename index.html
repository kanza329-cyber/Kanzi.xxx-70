<!-- GANTI BAGIAN INI SAJA DI DALAM FILEMU -->

<button id="yes" onclick="nembak()">MAU</button>
<button id="no" onmouseover="pindah()">GAK</button>

<script>
    function nembak() {
        // Ini adalah payload romantis yang kamu minta
        alert('I love you! Mau kah kamu jadi pacar ku? muach cantik 🌹❤️');
        
        // Bonus: Setelah klik OK, arahkan ke WhatsApp kamu biar dia langsung laporan!
        // Ganti nomor di bawah dengan nomormu (awali dengan 62)
        window.location.href = "https://wa.me";
    }

    function pindah() {
        var x = Math.random() * (window.innerWidth - 100);
        var y = Math.random() * (window.innerHeight - 100);
        var btn = document.getElementById('no');
        btn.style.position = 'absolute';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }
</script>
