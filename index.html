<!DOCTYPE html>
<html>
<head>
<title>Galeri Anime Premium</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #000000, #1a1a1a, #2b2b2b);
    color: gold;
}

/* LOGIN */
.login {
    text-align:center;
    margin-top:100px;
}

input {
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background: gold;
    color:black;
}

/* GALERI */
.gallery {
    display:none;
}

h1 {
    text-shadow: 0 0 10px gold;
}

/* FILTER */
.filter {
    margin:10px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap:10px;
    padding:20px;
}

.card {
    background:#111;
    padding:5px;
    border-radius:10px;
    position:relative;
}

.card img {
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

/* LIKE */
.like {
    position:absolute;
    bottom:5px;
    right:10px;
    cursor:pointer;
    font-size:18px;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal img {
    max-width:90%;
    max-height:90%;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
<h2>🔐 Login dulu</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="pass" placeholder="Password"><br>
<button onclick="login()">Masuk</button>
</div>

<!-- GALERI -->
<div class="gallery" id="gallery">

<h1>✨ Gambar Anime ✨</h1>

<!-- FILTER -->
<select class="filter" onchange="filter(this.value)">
<option value="all">Semua</option>
<option value="waifu">Waifu</option>
<option value="action">Action</option>
</select>

<div class="grid" id="grid">

</div>

<!-- MODAL ZOOM -->
<div class="modal" id="modal" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<script>

// LOGIN
function login(){
    let e = document.getElementById("email").value;
    let p = document.getElementById("pass").value;

    if(e && p){
        document.getElementById("login").style.display="none";
        document.getElementById("gallery").style.display="block";
    } else {
        alert("Isi dulu 😅");
    }
}

// LIKE
function like(el){
    el.textContent = el.textContent === "❤️" ? "💛" : "❤️";
}

// ZOOM
function zoom(src){
    document.getElementById("modal").style.display="flex";
    document.getElementById("zoomImg").src = src;
}

// FILTER
function filter(k){
    let cards = document.querySelectorAll(".card");
    cards.forEach(c=>{
        if(k==="all" || c.dataset.kategori===k){
            c.style.display="block";
        } else {
            c.style.display="none";
        }
    });
}

</script>
