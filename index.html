<!DOCTYPE html>
<html>
<head>
    <title>GAME MINI 🔥</title>
    <style>
        body {
            background: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZ74Su3aitFQ8wMtuaKBM8omF7yjmJz9cDgtJN-y42agQeRzjtDHEswpQD&s=10") no-repeat center center/cover;
            color: white;
            text-align: center;
            font-family: Arial;
            padding-top: 80px;
        }

        .box {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
        }

        input, button {
            padding: 10px;
            font-size: 18px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            cursor: pointer;
            background: #ff3b3b;
            color: white;
        }

        #admin {
            position: fixed;
            left: 10px;
            top: 10px;
            font-size: 12px;
            opacity: 0.7;
        }

        .win {
            animation: flash 0.3s infinite alternate;
        }

        @keyframes flash {
            from { background-color: rgba(0,0,0,0.7); }
            to { background-color: rgba(0,255,0,0.7); }
        }
    </style>
</head>
<body>

<div id="admin">admin web ini ganteng 😏</div>

<div class="box" id="game">
    <h1 id="judul">🎯 Tebak Angka</h1>
    <p id="status">Tebak angka 1 - 50</p>
    <p id="nyawa"></p>

    <input type="text" id="input">
    <br>
    <button onclick="aksi()">OK</button>
    <button onclick="ulang()">ULANGI</button>
</div>

<script>
let fase;
let angka;
let targetHewan;
let nyawa;

function startGame() {
    fase = 1;
    angka = Math.floor(Math.random() * 50) + 1;
    targetHewan = ["kucing","anjing","gajah","harimau","singa"][Math.floor(Math.random()*5)];
    nyawa = 2;

    document.getElementById("judul").innerHTML = "🎯 Tebak Angka";
    document.getElementById("status").innerHTML = "Tebak angka 1 - 50";
    document.getElementById("nyawa").innerHTML = "";
    document.getElementById("input").value = "";
}

function aksi() {
    let input = document.getElementById("input").value.toLowerCase();
    let status = document.getElementById("status");

    // FASE 1 (tanpa nyawa)
    if (fase === 1) {
        if (input == angka) {
            efekMenang();
            setTimeout(() => {
                fase = 2;
                document.getElementById("judul").innerHTML = "🔫 Tebak Nama Hewan";
                status.innerHTML = "Ketik nama hewan!";
                document.getElementById("nyawa").innerHTML = "❤️ Nyawa: " + nyawa;
                document.getElementById("input").value = "";
            }, 1000);
        } else {
            if (input < angka) {
                status.innerHTML = "⬆️ Terlalu kecil!";
            } else {
                status.innerHTML = "⬇️ Terlalu besar!";
            }
        }
    }

    // FASE 2 (pakai nyawa)
    else if (fase === 2) {
        if (input === targetHewan) {
            menangAkhir();
        } else {
            nyawa--;
            if (nyawa <= 0) {
                kalah();
            } else {
                status.innerHTML = "❌ Salah! Coba lagi!";
                document.getElementById("nyawa").innerHTML = "❤️ Nyawa: " + nyawa;
            }
        }
    }
}

function efekMenang() {
    let box = document.getElementById("game");
    box.classList.add("win");
    document.getElementById("status").innerHTML = "🔥 BENAR! Lanjut fase berikutnya!";
    setTimeout(() => box.classList.remove("win"), 1000);
}

function menangAkhir() {
    document.getElementById("game").innerHTML = `
        <h1 style="color:lime;">🎉 MENANG!!! 🎉</h1>
        <button onclick="ulang()">Main Lagi</button>
    `;
}

function kalah() {
    document.getElementById("game").innerHTML = `
        <h1 style="color:red;">💀 KALAH!</h1>
        <button onclick="ulang()">Coba Lagi</button>
    `;
}

function ulang() {
    document.getElementById("game").innerHTML = `
        <h1 id="judul">🎯 Tebak Angka</h1>
        <p id="status">Tebak angka 1 - 50</p>
        <p id="nyawa"></p>
        <input type="text" id="input">
        <br>
        <button onclick="aksi()">OK</button>
        <button onclick="ulang()">ULANGI</button>
    `;
    startGame();
}

// start pertama kali
startGame();
</script>

</body>
</html>
