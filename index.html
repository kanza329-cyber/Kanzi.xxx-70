<!DOCTYPE html>
<html>
<head>
    <title>Game Tebak Angka 🎯</title>
    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial;
            padding-top: 100px;
        }
        input, button {
            padding: 10px;
            font-size: 18px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }
        button {
            cursor: pointer;
            background: #ff3b3b;
            color: white;
        }
    </style>
</head>
<body>

<h1>🎯 Tebak Angka 1 - 100</h1>

<p id="status">Coba tebak angkanya!</p>

<input type="number" id="tebakan" placeholder="Masukkan angka">
<br>
<button onclick="cek()">TEBAK</button>

<script>
let angka = Math.floor(Math.random() * 100) + 1;
let percobaan = 0;

function cek() {
    let input = document.getElementById("tebakan").value;
    let status = document.getElementById("status");

    percobaan++;

    if (input == angka) {
        status.innerHTML = "🎉 BENAR! Kamu butuh " + percobaan + " percobaan!";
    } else if (input < angka) {
        status.innerHTML = "⬆️ Terlalu kecil!";
    } else {
        status.innerHTML = "⬇️ Terlalu besar!";
    }
}
</script>

</body>
</html>
