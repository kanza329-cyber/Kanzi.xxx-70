<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underground Video Player</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: Arial; margin: 0; }
        .header { background: #202020; padding: 15px; font-weight: bold; color: red; }
        .video-container { width: 100%; max-width: 800px; margin: auto; }
        video { width: 100%; border: 2px solid #333; }
        .info { padding: 15px; }
        h2 { font-size: 18px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header">HACK-TUBE v1.0</div>
    
    <div class="video-container">
        <!-- Ganti URL src dengan link video mp4 kamu -->
        <video controls autoplay>
            <source src="https://w3schools.com" type="video/mp4">
            Browser kamu terlalu kuno untuk jadi hacker!
        </video>
    </div>

    <div class="info">
        <h2>Target Video: Big Buck Bunny (Test Server)</h2>
        <p>Status: Disambungkan melalui Terminal Termux.</p>
    </div>
</body>
</html>
