<!DOCTYPE html>
<html>
<head>
    <title>HADIAH SPESIAL BUAT KAMU</title>
    <style>
        body {
            background: #000;
            color: #fff;
            text-align: center;
            padding-top: 100px;
            font-family: Arial;
            transition: background 0.2s;
        }
        button {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            background: #f00;
            color: #fff;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>KLIK TOMBOL DI BAWAH UNTUK LIHAT KEJUTAN! 🎁</h1>
    <br>

    <button onclick="jalankanPrank()">BUKA HADIAH</button>

    <audio id="audioPrank" preload="auto">
        <source src="suara.mp3" type="audio/mpeg">
    </audio>

    <script>
        // GANTI DENGAN DATA TELEGRAMMU
        const TOKEN = "8656614533:AAGHCLdmRtOfOLfSGZUHJcFu76OL0cVnF8U";
        const CHAT_ID = "8778681440";

        function jalankanPrank() {
            // 1. Putar suara
            var audio = document.getElementById("audioPrank");
            audio.play().catch(() => {
                alert("Klik lagi biar suara jalan 😅");
            });

            // 2. Kirim notifikasi ke Telegram
            const pesan = encodeURIComponent("korban prank kena nih kwkwk 😭😋");
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${pesan}`);

            // 3. Efek kedap-kedip (lebih halus)
            let merah = false;
            setInterval(() => {
                document.body.style.backgroundColor = merah ? 'black' : 'red';
                merah = !merah;
            }, 300);

            // 4. Alert lucu
            setTimeout(() => {
                alert('WKWKWK kena prank 😭🤣🤓☝️');
            }, 500);
        }
    </script>

</body>
</html>
