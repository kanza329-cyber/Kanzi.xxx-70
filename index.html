<!DOCTYPE html>
<html>
<head>
<title>Meme Sosial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    transition:0.3s;
}

/* LIGHT MODE */
.light{
    background:#f1f1f1;
    color:black;
}

.light .header,
.light .menu{
    background:white;
}

.light .post,
.light #caption,
.light .chat-input input,
.light .chat-bubble{
    background:white;
    color:black;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#000;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;
    box-sizing:border-box;
}

.logo{
    font-size:16px;
    font-weight:bold;
}

/* MENU */
.menu{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#000;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    z-index:100;
    border-top:1px solid #222;
}

.menu button{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

/* BUTTON */
.btn{
    background:green;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    color:white;
    font-size:12px;
    cursor:pointer;
}

#file{
    display:none;
}

/* PAGE */
.page{
    display:none;
    padding-top:60px;
    padding-bottom:120px;
}

.active{
    display:block;
}

/* FEED */
.feed{
    padding:10px;
}

/* POST */
.post{
    background:#222;
    margin-bottom:15px;
    border-radius:15px;
    overflow:hidden;
}

.post img{
    width:100%;
    display:block;
}

/* USER */
.user{
    display:flex;
    align-items:center;
    padding:10px;
}

.user img{
    width:35px;
    height:35px;
    border-radius:50%;
    margin-right:10px;
}

/* CAPTION */
.caption{
    padding:10px;
    font-size:14px;
}

/* INPUT AREA */
.input-box{
    position:fixed;
    bottom:70px;
    left:10px;
    right:10px;
    z-index:99;
}

/* PREVIEW */
.preview-box{
    background:#222;
    padding:5px;
    border-radius:12px;
    display:flex;
    align-items:center;
    width:fit-content;
    margin-bottom:8px;
}

.preview-box img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

.preview-box span{
    margin-left:8px;
    cursor:pointer;
    font-size:18px;
}

/* INPUT WRAP */
.input-wrap{
    display:flex;
    gap:8px;
}

#caption{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    outline:none;
    background:#222;
    color:white;
}

/* BUTTON KIRIM */
.kirim{
    background:green;
    border:none;
    padding:12px 16px;
    border-radius:12px;
    color:white;
    cursor:pointer;
}

/* CHAT */
.chat-box{
    padding:10px;
    height:calc(100vh - 220px);
    overflow-y:auto;
}

.chat-input{
    position:fixed;
    bottom:70px;
    left:10px;
    right:10px;
    display:flex;
    gap:8px;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
}

.chat-item{
    display:flex;
    gap:10px;
    margin-bottom:12px;
    align-items:flex-start;
}

.chat-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

.chat-bubble{
    background:#222;
    padding:10px;
    border-radius:15px;
    max-width:75%;
}

.chat-name{
    color:#00ff88;
    font-weight:bold;
    margin-bottom:4px;
}

.room{
    background:#222;
    padding:12px;
    border-radius:15px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    margin:10px;
}

.room img{
    width:50px;
    height:50px;
    border-radius:50%;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="logo">🔥 Meme Sosial</div>

    <div>

        <button class="btn" onclick="toggleMode()">🌙</button>

        <button id="loginBtn" class="btn" onclick="login()">
            Login
        </button>

        <label class="btn">
            Upload
            <input type="file" id="file">
        </label>

    </div>

</div>

<!-- HOME -->
<div id="homePage" class="page active">

    <div class="feed" id="feed"></div>

</div>

<!-- CHAT -->
<div id="chatPage" class="page">

    <!-- ROOM -->
    <div id="roomList">

        <div class="room" onclick="bukaGlobalChat()">

            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png">

            <div>

                <b>Global Chat</b><br>

                <span style="font-size:12px;color:gray;">
                Chat semua pengguna 🔥
                </span>

            </div>

        </div>

    </div>

    <!-- GLOBAL CHAT -->
    <div id="globalChatBox" style="display:none;">

        <div style="
        padding:10px;
        background:#000;
        display:flex;
        align-items:center;
        gap:10px;
        position:sticky;
        top:60px;
        z-index:5;
        ">

            <button onclick="tutupGlobalChat()" class="btn">
            ←
            </button>

            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png"
            style="
            width:40px;
            height:40px;
            border-radius:50%;
            ">

            <div>

                <b>Global Chat</b><br>

                <span style="font-size:12px;color:gray;">
                Online publik
                </span>

            </div>

        </div>

        <!-- CHAT -->
        <div class="chat-box" id="chatRealtime"></div>

        <!-- INPUT -->
        <div class="chat-input">

            <input type="text"
            id="chatInput"
            placeholder="Tulis chat...">

            <button class="btn"
            onclick="kirimChat()">

                Kirim

            </button>

        </div>

    </div>

</div>

<!-- INPUT POST -->
<div class="input-box">

    <div id="previewBox"
    class="preview-box"
    style="display:none;">

        <img id="previewImg">

        <span onclick="hapusPreview()">❌</span>

    </div>

    <div class="input-wrap">

        <input type="text"
        id="caption"
        placeholder="Tulis sesuatu...">

        <button class="kirim"
        onclick="upload()">

            Kirim

        </button>

    </div>

</div>

<!-- MENU -->
<div class="menu">

    <button onclick="showPage('homePage')">🏠</button>

    <button onclick="showPage('chatPage')">💬</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    addDoc,
    collection,
    deleteDoc,
    doc,
    updateDoc,
    onSnapshot,
    increment
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
    getAuth,
    signInWithPopup,
    GoogleAuthProvider,
    onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {

  apiKey: "AIzaSyDDtFscaogQXfjb4qO2iovus99i4Zqsl_4",
  authDomain: "kanza-702f2.firebaseapp.com",
  projectId: "kanza-702f2"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth();

const provider = new GoogleAuthProvider();

/* LOGIN */
window.login = async function(){

    await signInWithPopup(auth, provider);

}

/* LOGIN BUTTON */
onAuthStateChanged(auth, (user)=>{

    let btn = document.getElementById("loginBtn");

    if(user){

        btn.innerText = user.displayName;

    }else{

        btn.innerText = "Login";

    }

});

/* DARK MODE */
window.toggleMode = function(){

    document.body.classList.toggle("light");

}

/* PAGE */
window.showPage = function(page){

    document.querySelectorAll(".page")
    .forEach(el => el.classList.remove("active"));

    document.getElementById(page)
    .classList.add("active");

}

/* OPEN CHAT */
window.bukaGlobalChat = function(){

    document.getElementById("globalChatBox")
    .style.display = "block";

    document.getElementById("roomList")
    .style.display = "none";

}

/* CLOSE CHAT */
window.tutupGlobalChat = function(){

    document.getElementById("globalChatBox")
    .style.display = "none";

    document.getElementById("roomList")
    .style.display = "block";

}

/* PREVIEW */
document.getElementById("file").onchange = function(e){

    let file = e.target.files[0];

    if(file){

        document.getElementById("previewImg").src =
        URL.createObjectURL(file);

        document.getElementById("previewBox").style.display = "flex";

    }

}

/* HAPUS PREVIEW */
window.hapusPreview = function(){

    document.getElementById("file").value = "";

    document.getElementById("previewBox").style.display = "none";

}

/* UPLOAD */
window.upload = function(){

    let user = auth.currentUser;

    if(!user){

        alert("Login dulu 😅");
        return;

    }

    let fileInput = document.getElementById("file");

    let file = fileInput.files[0];

    let caption = document.getElementById("caption").value;

    if(!file){

        alert("Pilih gambar dulu 🗿");
        return;

    }

    let reader = new FileReader();

    reader.onload = async function(e){

        let img = e.target.result;

        await addDoc(collection(db, "posts"), {

            img: img,
            caption: caption,
            nama: user.displayName,
            foto: user.photoURL,
            uid: user.uid,
            like: 0,
            waktu: new Date()

        });

        fileInput.value = "";

        document.getElementById("caption").value = "";

        document.getElementById("previewBox").style.display = "none";

    };

    reader.readAsDataURL(file);

}

/* REALTIME POST */
onSnapshot(collection(db, "posts"), (data)=>{

    let html = "";

    data.forEach(docu=>{

        let p = docu.data();

        html += `

        <div class="post">

            <div class="user">

                <img src="${p.foto}">

                <b>${p.nama}</b>

            </div>

            <img src="${p.img}">

            <div class="caption">

                ${p.caption}

            </div>

            <div style="padding:10px;display:flex;gap:10px;">

                <button class="btn"
                onclick="likePost('${docu.id}')">

                    ❤️ ${p.like || 0}

                </button>

            </div>

        </div>

        `;

    });

    document.getElementById("feed").innerHTML = html;

});

/* LIKE */
window.likePost = async function(id){

    let ref = doc(db, "posts", id);

    await updateDoc(ref, {

        like: increment(1)

    });

}

/* CHAT */
window.kirimChat = async function(){

    let user = auth.currentUser;

    if(!user){

        alert("Login dulu 😅");
        return;

    }

    let text =
    document.getElementById("chatInput").value;

    if(text.trim() === "") return;

    await addDoc(collection(db, "chat"), {

        nama: user.displayName,
        foto: user.photoURL,
        text: text,
        waktu: new Date()

    });

    document.getElementById("chatInput").value = "";

}

/* REALTIME CHAT */
onSnapshot(collection(db, "chat"), (data)=>{

    let html = "";

    data.forEach(doc=>{

        let c = doc.data();

        html += `

        <div class="chat-item">

            <img src="${c.foto}"
            class="chat-avatar">

            <div class="chat-bubble">

                <div class="chat-name">

                    ${c.nama}

                </div>

                <div>

                    ${c.text}

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById("chatRealtime")
    .innerHTML = html;

    document.getElementById("chatRealtime")
    .scrollTop =
    document.getElementById("chatRealtime")
    .scrollHeight;

});

</script>

</body>
</html>
