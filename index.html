<!DOCTYPE html>
<html>
<head>
<title>Meme Sosial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    width:100%;
    background:#000;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:10;
}

/* BUTTON */
.btn{
    background:green;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    color:white;
    font-size:12px;
    cursor:pointer;
}

/* FILE */
#file{ display:none; }

/* FEED */
.feed{
    margin-top:60px;
    padding:10px;
}

/* POST */
.post{
    background:#222;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
}

.post img{ width:100%; }

.user{
    display:flex;
    align-items:center;
    padding:8px;
}

.user img{
    width:30px;
    height:30px;
    border-radius:50%;
    margin-right:8px;
}

.caption{
    padding:10px;
}

/* INPUT */
#caption{
    position:fixed;
    bottom:10px;
    left:10px;
    width:60%;
    padding:10px;
    border-radius:10px;
    border:none;
}

.kirim{
    position:fixed;
    bottom:10px;
    right:10px;
    background:green;
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <div>🔥 Meme Feed</div>

    <div>
        <button class="btn" onclick="login()">Login</button>

        <label class="btn">
            Upload
            <input type="file" id="file">
        </label>
    </div>
</div>

<div class="feed" id="feed"></div>

<input type="text" id="caption" placeholder="Caption...">
<button class="kirim" onclick="upload()">Kirim</button>

<script type="module">

// 🔥 IMPORT FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 CONFIG (GANTI PUNYA KAMU)
const firebaseConfig = {
  apiKey: "AIzaSyDDtFscaogQXfjb4qO2iovus99i4Zqsl_4",
  authDomain: "kanza-702f2.firebaseapp.com",
  projectId: "kanza-702f2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

// LOGIN
window.login = async function(){
    let result = await signInWithPopup(auth, provider);
    alert("Login sebagai: " + result.user.displayName);
}

// ANTI SPAM
let loading = false;
let lastUpload = 0;

// UPLOAD
window.upload = function(){

    let user = auth.currentUser;

    if(!user){
        alert("Login dulu 🗿💢");
        return;
    }

    let now = Date.now();

    if(loading){
        alert("Tunggu bentar taik  🗿");
        return;
    }

    if(now - lastUpload < 3000){
        alert("Jangan spam  ku lepar kau kalau spam😭");
        return;
    }

    let file = document.getElementById("file").files[0];
    let caption = document.getElementById("caption").value;

    if(!file){
        alert("Pilih gambar dulu  sana hush🗿");
        return;
    }

    if(file.size > 1000000){
        alert("Max 1MB 😵");
        return;
    }

    loading = true;

    let reader = new FileReader();

    reader.onload = async function(e){
        let img = e.target.result;

        await addDoc(collection(db, "posts"), {
            img: img,
            caption: caption,
            nama: user.displayName,
            foto: user.photoURL,
            waktu: new Date()
        });

        lastUpload = Date.now();
        loading = false;

        document.getElementById("caption").value = "";
        document.getElementById("file").value = "";

        tampilkan();
    };

    reader.readAsDataURL(file);
}

// TAMPILKAN
async function tampilkan(){
    let data = await getDocs(collection(db, "posts"));

    let html = "";

    data.forEach(doc=>{
        let p = doc.data();

        html += `
        <div class="post">
            <div class="user">
                <img src="${p.foto}">
                <b>${p.nama}</b>
            </div>

            <img src="${p.img}">
            <div class="caption">${p.caption}</div>
        </div>
        `;
    });

    document.getElementById("feed").innerHTML = html;
}

tampilkan();

</script>

</body>
</html>
