<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kulkas Pintar</title>

<style>
body {
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

input {
    padding:10px;
    width:70%;
    border-radius:10px;
    border:none;
}

button {
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:green;
    color:white;
}

.card {
    background:#222;
    margin:10px;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>🍳 Ide Masakan dari Kulkas</h2>

<input type="text" id="bahan" placeholder="contoh: ayam, telur, tomat">
<br>
<button onclick="cari()">Cari Masakan</button>

<div id="hasil"></div>

<script>

// DATA RESEP
let resep = [
    {
        nama: "Tumis Ayam Sawi",
        bahan: ["ayam","sawi"]
    },
    {
        nama: "Telur Dadar Tomat",
        bahan: ["telur","tomat"]
    },
    {
        nama: "Tahu Kecap",
        bahan: ["tahu","kecap"]
    }
];

function cari(){
    let input = document.getElementById("bahan").value.toLowerCase();
    let userBahan = input.split(",");

    let hasil = "";

    resep.forEach(r => {
        let cocok = r.bahan.every(b => userBahan.includes(b));

        if(cocok){
            hasil += `<div class="card">${r.nama}</div>`;
        }
    });

    document.getElementById("hasil").innerHTML = 
        hasil || "<p>😅 Tidak ada resep cocok</p>";
}

</script>

</body>
</html>
