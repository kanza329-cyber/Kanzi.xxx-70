<!DOCTYPE html>
<html>
<head>
<title>Meme Sosial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    transition:0.3s;
}

/* LIGHT MODE */
.light{
    background:#f1f1f1;
    color:black;
}

.light .header,
.light .menu{
    background:white;
}

.light .post,
.light #caption,
.light .chat,
.light .chat-input input,
.light .room-card{
    background:white;
    color:black;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#000;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;
    box-sizing:border-box;
}

.logo{
    font-size:16px;
    font-weight:bold;
}

/* MENU */
.menu{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#000;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    z-index:100;
    border-top:1px solid #222;
}

.menu button{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

/* BUTTON */
.btn{
    background:green;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    color:white;
    font-size:12px;
    cursor:pointer;
}

#file{
    display:none;
}

/* PAGE */
.page{
    display:none;
    padding-top:60px;
    padding-bottom:120px;
}

.active{
    display:block;
}

/* FEED */
.feed{
    padding:10px;
}

/* POST */
.post{
    background:#222;
    margin-bottom:15px;
    border-radius:15px;
    overflow:hidden;
}

.post img{
    width:100%;
    display:block;
}

/* USER */
.user{
    display:flex;
    align-items:center;
    padding:10px;
}

.user img{
    width:35px;
    height:35px;
    border-radius:50%;
    margin-right:10px;
}

/* CAPTION */
.caption{
    padding:10px;
    font-size:14px;
}

/* INPUT POST */
.input-box{
    position:fixed;
    bottom:70px;
    left:10px;
    right:10px;
    z-index:99;
}

/* PREVIEW */
.preview-box{
    background:#222;
    padding:5px;
    border-radius:12px;
    display:flex;
    align-items:center;
    width:fit-content;
    margin-bottom:8px;
}

.preview-box img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

.preview-box span{
    margin-left:8px;
    cursor:pointer;
}

/* INPUT WRAP */
.input-wrap{
    display:flex;
    gap:8px;
}

#caption{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
    outline:none;
}

/* BUTTON */
.kirim{
    background:green;
    border:none;
    padding:12px 16px;
    border-radius:12px;
    color:white;
    cursor:pointer;
}

/* CHAT ROOM */
.room-wrap{
    padding:10px;
}

.room-card{
    background:#222;
    padding:12px;
    border-radius:15px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

.room-card img{
    width:50px;
    height:50px;
    border-radius:50%;
}

/* CHAT AREA */
.chat-area{
    display:none;
}

.chat-header{
    position:sticky;
    top:60px;
    background:#000;
    padding:10px;
    display:flex;
    align-items:center;
    gap:10px;
    z-index:5;
}

.chat-header img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.chat-box{
    padding:10px;
    padding-bottom:140px;
}

.chat{
    background:#222;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
}

.chat b{
    color:#00ff88;
}

/* CHAT INPUT */
.chat-input{
    position:fixed;
    bottom:70px;
    left:10px;
    right:10px;
    display:flex;
    gap:8px;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
    outline:none;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="logo">🔥 Meme+anime Sosial</div>

    <div>

        <button class="btn" onclick="toggleMode()">🌙</button>

        <button id="loginBtn" class="btn" onclick="login()">
            Login
        </button>

        <label class="btn">
            Upload
            <input type="file" id="file">
        </label>

    </div>

</div>

<!-- HOME -->
<div id="homePage" class="page active">

    <div class="feed" id="feed"></div>

</div>

<!-- CHAT PAGE -->
<div id="chatPage"
class="page">

<div id="roomList"
class="room-wrap">

<div class="room-card"
onclick="bukaGlobalChat()">

<img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png">

<div>
<b>Global Chat</b><br>

<span style="
font-size:12px;
color:gray;">

Chat semua pengguna 🔥

</span>

</div>

</div>

</div>

<div id="globalChatArea"
class="chat-area">

<div class="chat-header">

<button class="btn"
onclick="tutupGlobalChat()">

←

</button>

<img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png">

<div>

<b>Global Chat</b><br>

<span style="
font-size:12px;
color:gray;">

Online publik

</span>

</div>

</div>

<div class="chat-box"
id="chatRealtime">

</div>

<div class="chat-input">

<input
type="text"
id="chatInput"
placeholder="Tulis chat...">

<button class="btn"
onclick="kirimChat()">

Kirim

</button>

</div>

</div>

</div>
<!-- PROFILE -->
<div id="profilePage" class="page">

    <div style="padding:20px;text-align:center;">

        <img id="profileFoto"
        style="
        width:90px;
        height:90px;
        border-radius:50%;
        ">

        <h2 id="profileNama">
            User
        </h2>

        <input
        type="text"
        id="editNama"
        placeholder="Nama baru..."
        style="
        padding:10px;
        border:none;
        border-radius:10px;
        width:80%;
        ">

        <br><br>

        <button class="btn"
        onclick="gantiNama()">

            Simpan Nama

        </button>

    </div>

    <div
    id="profilePosts"
    class="feed">

    </div>

</div>

    <!-- ROOM -->
 

        
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png">

            <div>
                <b>Global Chat</b><br>
                <span style="font-size:12px;color:gray;">
                    Chat semua pengguna 🔥
                </span>
            </div>

        </div>

    </div>

    <!-- CHAT -->
    

   

            <button class="btn" onclick="tutupGlobalChat()">
                ←
            </button>

            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png">

            <div>
                <b>Global Chat</b><br>
                <span style="font-size:12px;color:gray;">
                    Online publik
                </span>
            </div>

        </div>




            <input
            type="text"
            id="chatInput"
            placeholder="Tulis chat...">

            <button class="btn" onclick="kirimChat()">
                Kirim
            </button>

        </div>

    </div>

</div>
</div>
<!-- INPUT POSTING -->
<div class="input-box" id="postInputBox">

    <div id="previewBox"
    class="preview-box"
    style="display:none;">

        <img id="previewImg">

        <span onclick="hapusPreview()">❌</span>

    </div>

    <div class="input-wrap">

        <input
        type="text"
        id="caption"
        placeholder="Tulis sesuatu...">

        <button class="kirim"
        onclick="upload()">

            Kirim

        </button>

    </div>

</div>

<!-- MENU -->
<div class="menu">

    <button onclick="showPage('homePage')">
        🏠
    </button>

    <button onclick="showPage('chatPage')">
        💬
    </button>
<button onclick="showPage('profilePage')">
👤
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    addDoc,
    collection,
    deleteDoc,
    doc,
    updateDoc,
    onSnapshot,
    increment
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider,
onAuthStateChanged,
updateProfile
}
 from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {

  apiKey: "AIzaSyDDtFscaogQXfjb4qO2iovus99i4Zqsl_4",
  authDomain: "kanza-702f2.firebaseapp.com",
  projectId: "kanza-702f2"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth();

const provider = new GoogleAuthProvider();

/* LOGIN */
window.login = async function(){

    await signInWithPopup(auth, provider);

}

/* LOGIN BUTTON */
onAuthStateChanged(auth, (user)=>{

    let btn =
    document.getElementById("loginBtn");

    if(user){

        btn.innerText =
        user.displayName;

    }else{

        btn.innerText = "Login";

    }

});

/* MODE */
window.toggleMode = function(){

    document.body.classList.toggle("light");

}

/* PAGE */
window.showPage = function(page){

    document.querySelectorAll(".page")
    .forEach(el =>
    el.classList.remove("active"));

    document.getElementById(page)
    .classList.add("active");

    // SEMBUNYI INPUT POST DI CHAT
    if(page === "chatPage"){

        document.getElementById("postInputBox")
        .style.display = "none";

    }else{

        document.getElementById("postInputBox")
        .style.display = "block";

    }

}

/* BUKA CHAT */
window.bukaGlobalChat = function(){

    document.getElementById("roomList")
    .style.display = "none";

    document.getElementById("globalChatArea")
    .style.display = "block";

}

/* TUTUP CHAT */
window.tutupGlobalChat = function(){

    document.getElementById("roomList")
    .style.display = "block";

    document.getElementById("globalChatArea")
    .style.display = "none";

}

/* PREVIEW */
document.getElementById("file")
.onchange = function(e){

    let file = e.target.files[0];

    if(file){

        document.getElementById("previewImg")
        .src = URL.createObjectURL(file);

        document.getElementById("previewBox")
        .style.display = "flex";

    }

}

/* HAPUS PREVIEW */
window.hapusPreview = function(){

    document.getElementById("file").value = "";

    document.getElementById("previewBox")
    .style.display = "none";

}

/* UPLOAD */
window.upload = function(){

    let user = auth.currentUser;

    if(!user){

        alert("Login dulu 😅");
        return;

    }

    let fileInput =
    document.getElementById("file");

    let file = fileInput.files[0];

    let caption =
    document.getElementById("caption").value;

    if(!file){

        alert("Pilih gambar dulu 🗿");
        return;

    }

    let reader = new FileReader();

reader.onload = async function(e){

let btn =
document.querySelector(".kirim");

btn.innerText =
"Uploading...";

setTimeout(async()=>{

await addDoc(
collection(db,"posts"),{

img:e.target.result,
caption:caption,
nama:user.displayName,
foto:user.photoURL,
uid:user.uid,
like:0,
waktu:new Date()

});

btn.innerText="Kirim";

fileInput.value="";

document.getElementById(
"caption"
).value="";

document.getElementById(
"previewBox"
).style.display="none";

},1500);

};

reader.readAsDataURL(file);


}

/* REALTIME POST */
onSnapshot(collection(db, "posts"), (data)=>{

    let html = "";

    data.forEach(docu=>{

        let p = docu.data();

        html += `

        <div class="post">

            <div class="user">

                <img src="${p.foto}">

                <b>${p.nama}</b>

            </div>

            <img src="${p.img}">

            <div class="caption">

                ${p.caption}

            </div>

            <div style="
            padding:10px;
            display:flex;
            gap:10px;">

                <button class="btn"
                onclick="likePost('${docu.id}')">

                    ❤️ ${p.like || 0}

                </button>

                ${
                    auth.currentUser &&
                    auth.currentUser.uid === p.uid

                    ?

                    `<button class="btn"
                    onclick="hapusPost('${docu.id}')">

                    🗑️

                    </button>`

                    :

                    ""

                }

            </div>

        </div>

        `;

    });

    document.getElementById("feed")
    .innerHTML = html;

});

/* LIKE */
window.likePost = async function(id){

    await updateDoc(
    doc(db, "posts", id), {

        like: increment(1)

    });

}

/* HAPUS */
window.hapusPost = async function(id){

    let yakin =
    confirm("Hapus postingan?");

    if(yakin){

        await deleteDoc(
        doc(db, "posts", id));

    }

}

/* CHAT */
window.kirimChat = async function(){

    let user = auth.currentUser;

    if(!user){

        alert("Login dulu 😅");
        return;

    }

    let text =
    document.getElementById("chatInput").value;

    if(text === "") return;

    await addDoc(collection(db, "chat"), {

        nama: user.displayName,
        text: text

    });

    document.getElementById("chatInput")
    .value = "";

}
/* REALTIME CHAT */
onSnapshot(collection(db, "chat"), (data)=>{

    let html = "";

    data.forEach(docu=>{

        let c = docu.data();

        html += `

        <div class="chat">

            <b>${c.nama}</b><br>

            ${c.text}

        </div>

        `;

    });

    document.getElementById(
    "chatRealtime"
    ).innerHTML = html;

});


/* PROFILE USER */
onAuthStateChanged(auth,(user)=>{

    if(!user) return;

    document.getElementById(
    "profileNama"
    ).innerText =
    user.displayName;

    document.getElementById(
    "profileFoto"
    ).src =
    user.photoURL;

});


/* GANTI NAMA */
window.gantiNama = async function(){

    let user =
    auth.currentUser;

    if(!user){

        alert("Login dulu");
        return;

    }

    let namaBaru =
    document.getElementById(
    "editNama"
    ).value;

    if(namaBaru==="") return;

    await updateProfile(user,{

        displayName:namaBaru

    });

    document.getElementById(
    "profileNama"
    ).innerText =
    namaBaru;

    alert(
    "Nama berhasil diganti 🔥"
    );

}


 

</script>

</body>
</html>
