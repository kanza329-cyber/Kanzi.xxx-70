<!DOCTYPE html>
<html>
<head>
    <title>Tes Audio</title>
</head>
<body style="background:black; color:white; text-align:center; padding-top:100px; font-family:Arial;">

    <h1>TES AUDIO 🎧</h1>

    <!-- Player buat tes -->
    <audio controls>
        <source src="Poin.m4a" type="audio/mp4">
    </audio>

    <br><br>

    <!-- Tombol manual -->
    <button onclick="playAudio()" style="padding:15px 30px; font-size:18px; cursor:pointer;">
        PLAY
    </button>

    <!-- Audio utama -->
    <audio id="audioPrank" src="Poin.m4a"></audio>

    <script>
        function playAudio() {
            var audio = document.getElementById("audioPrank");
            audio.volume = 0.3;
            audio.currentTime = 0;

            audio.play().catch(() => {
                alert("Audio gagal diputar 😭 kemungkinan format tidak didukung");
            });
        }
    </script>

</body>
</html>
