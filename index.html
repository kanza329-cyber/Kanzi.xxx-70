<!DOCTYPE html>
<html>
<head>
<title>Galeri Anime Premium</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(to bottom, #000000, #1a1a1a);
    color: gold;
}

/* HEADER */
h1 {
    position: sticky;
    top: 0;
    background: #000;
    padding: 15px;
    margin: 0;
    font-size: 18px;
    text-shadow: 0 0 10px gold;
    z-index: 10;
}

/* LOGIN */
.login {
    text-align:center;
    margin-top:120px;
}

input {
    padding:12px;
    width: 70%;
    margin:5px;
    border-radius:12px;
    border:none;
}

button {
    padding:12px 25px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background: gold;
    color:black;
}

/* FILTER */
.filter {
    margin:10px;
    padding:10px;
    border-radius:10px;
}

/* GRID MOBILE */
.grid {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:12px;
    padding:10px;
}

/* CARD */
.card {
    background:#111;
    border-radius:15px;
    overflow:hidden;
    position:relative;
    box-shadow: 0 0 10px rgba(255,215,0,0.2);
}
/* IMAGE */
.card img {
    width:100%;
    height:150px;
    object-fit:cover;
    transition: 0.3s;
}

/* EFEK PENCET */
.card img:active {
    transform: scale(0.95);
}

/* LIKE */
.like {
    position:absolute;
    bottom:8px;
    right:10px;
    font-size:20px;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
}

.modal img {
    max-width:95%;
    max-height:95%;
    border-radius:10px;
}
</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
<h2>🔐 Login dulu</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="pass" placeholder="Password"><br>
<button onclick="login()">Masuk</button>
</div>

<!-- GALERI -->
<div class="gallery" id="gallery">

<h1>✨ Gambar Anime ✨</h1>

<option value="all">Semua</option>
<option value="waifu">Waifu</option>
<option value="action">Action</option>

<!-- MODAL ZOOM -->
<div class="modal" id="modal" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<script>

// LOGIN
function login(){
    let e = document.getElementById("email").value;
    let p = document.getElementById("pass").value;

    if(e && p){
        document.getElementById("login").style.display="none";
        document.getElementById("gallery").style.display="block";
    } else {
        alert("Isi dulu 😅");
    }
}

// LIKE
function like(el){
    el.textContent = el.textContent === "❤️" ? "💛" : "❤️";
}

// ZOOM
function zoom(src){
    document.getElementById("modal").style.display="flex";
    document.getElementById("zoomImg").src = src;
}

// FILTER
function filter(k){
    let cards = document.querySelectorAll(".card");
    cards.forEach(c=>{
        if(k==="all" || c.dataset.kategori===k){
            c.style.display="block";
        } else {
            c.style.display="none";
        }
    });
}

</script>
