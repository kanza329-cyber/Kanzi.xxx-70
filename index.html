<!DOCTYPE html>
<html>
<head>
    <title>TES KECEPATAN INTERNET</title>
    <style>
        body {
            background: #111;
            color: #fff;
            text-align: center;
            font-family: Arial;
            padding-top: 100px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>

<h1>TES KECEPATAN INTERNET 📶</h1>

<p id="status">Klik tombol untuk mulai</p>

<button onclick="testSpeed()">Mulai Tes</button>

<script>
async function testSpeed() {
    const status = document.getElementById("status");

    status.innerHTML = "Mengukur... ⏳";

    // TEST DOWNLOAD
    const fileUrl = "https://speed.hetzner.de/10MB.bin"; // file test
    const startTime = new Date().getTime();

    try {
        const response = await fetch(fileUrl + "?cache=" + Math.random());
        const blob = await response.blob();
        const endTime = new Date().getTime();

        const duration = (endTime - startTime) / 1000; // detik
        const bitsLoaded = blob.size * 8;
        const speedMbps = (bitsLoaded / duration / 1024 / 1024).toFixed(2);

        // TEST PING
        const pingStart = new Date().getTime();
        await fetch("https://www.google.com", { mode: "no-cors" });
        const pingEnd = new Date().getTime();
        const ping = pingEnd - pingStart;

        status.innerHTML = `
        🚀 Kecepatan: ${speedMbps} Mbps <br>
        📡 Ping: ${ping} ms
        `;
    } catch (err) {
        status.innerHTML = "Gagal tes 😭 cek koneksi atau browser";
    }
}
</script>

</body>
</html>
